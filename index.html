<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ろぐーる</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DotGothic16&display=swap" rel="stylesheet">
<style>
  body {
    background-color: #111111; /* レトロゲーム風の黒背景 */
    color: #FFFFFF;
    font-family: 'DotGothic16', sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    margin: 0;
    padding: 20px;
    box-sizing: border-box;
    text-align: center;
  }
  #app-container {
    max-width: 400px;
    width: 100%;
    /* メッセージウィンドウ風の枠線 */
    border: 4px solid #FFFFFF;
    border-radius: 8px;
    padding: 30px 20px;
    background-color: #000000;
  }
  .greeting-text {
    font-size: 1.1rem;
    color: #AAAAAA;
    margin-bottom: 20px;
  }
  .question-text {
    font-size: 1.5rem;
    margin-bottom: 40px;
    line-height: 1.6;
    letter-spacing: 0.05em;
  }
  .message-text {
    font-size: 1.3rem;
    margin-bottom: 30px;
    line-height: 1.6;
  }
  .streak-text {
    font-size: 1.5rem;
    color: #FFD700; /* ゴールド系の色で強調 */
    margin-top: 20px;
    margin-bottom: 20px;
  }
  .button-group {
    display: flex;
    flex-direction: column;
    gap: 15px;
  }
  button {
    background-color: #000000;
    color: #FFFFFF;
    border: 2px solid #FFFFFF;
    padding: 15px;
    font-size: 1.2rem;
    font-family: 'DotGothic16', sans-serif;
    border-radius: 4px;
    cursor: pointer;
    transition: all 0.2s;
  }
  button:hover, button:active {
    background-color: #FFFFFF;
    color: #000000;
  }
  .btn-secondary {
    border-color: #888888;
    color: #888888;
  }
  .step-indicator {
    font-size: 1rem;
    color: #888888;
    margin-bottom: 10px;
  }
  /* フェードインアニメーション */
  .fade-in {
    animation: fadeInAnimation 0.5s ease-in forwards;
  }
  @keyframes fadeInAnimation {
    0% { opacity: 0; transform: translateY(5px); }
    100% { opacity: 1; transform: translateY(0); }
  }
</style>
</head>
<body>

<div id="app-container">
  <div id="display-area">
    </div>
</div>

<script>
  const stage1Questions = [
    "きょう(あした)のスケジュールは？",
    "今日のTODOやタスクは？",
    "今日の目標は？"
  ];

  const stage2Pool = [
    "今日達成したこと、出来たことは？",
    "今日の発見、新しく知ったことは？",
    "今日一番美味しかったものは？",
    "今日、少しでも気分が上がった瞬間は？",
    "今日、誰かに「ありがとう」と言いたいことは？",
    "今日の自分に点数をつけるなら何点？その理由は？"
  ];

  const stage3Pool = [
    "３ヶ月後の自分はどうなっていたい？",
    "今、一番やりたいこと・行きたい場所は？",
    "最近、心に残った言葉やニュースは？",
    "もし明日が完全に自由な1日だったら何をする？",
    "最近買ってよかったもの、または欲しいものは？",
    "今抱えているモヤモヤを一つだけ書き出すとしたら？"
  ];

  let dailyQuestions = []; 
  let currentIndex = 0;    

  const displayArea = document.getElementById('display-area');

  const getTodayString = () => {
    const d = new Date();
    return `${d.getFullYear()}-${d.getMonth()+1}-${d.getDate()}`;
  };

  const getYesterdayString = () => {
    const d = new Date();
    d.setDate(d.getDate() - 1);
    return `${d.getFullYear()}-${d.getMonth()+1}-${d.getDate()}`;
  };

  const getRandomQuestions = (pool, count) => {
    const shuffled = [...pool].sort(() => 0.5 - Math.random());
    return shuffled.slice(0, count);
  };

  // 時間帯に応じた挨拶を取得
  const getGreeting = () => {
    const hour = new Date().getHours();
    if (hour >= 5 && hour < 11) {
      return "おはようございます。";
    } else if (hour >= 11 && hour < 17) {
      return "こんにちは。";
    } else {
      return "今日もお疲れ様でした。";
    }
  };

  // アニメーションを再発火させながらHTMLを描画
  const renderWithFade = (htmlContent) => {
    displayArea.classList.remove('fade-in');
    void displayArea.offsetWidth; // リフローを強制してアニメーションをリセット
    displayArea.innerHTML = htmlContent;
    displayArea.classList.add('fade-in');
  };

  const initApp = () => {
    const savedDate = localStorage.getItem('techo_date');
    const savedIndex = localStorage.getItem('techo_index');
    const savedQuestions = localStorage.getItem('techo_questions');
    const today = getTodayString();

    if (savedDate === today && savedQuestions && savedIndex !== null) {
      dailyQuestions = JSON.parse(savedQuestions);
      currentIndex = parseInt(savedIndex);
      
      if (currentIndex > 0 && currentIndex < 9) {
        renderResumeConfirm();
      } else if (currentIndex >= 9) {
        renderFinish(); 
      } else {
        renderQuestion();
      }
    } else {
      resetAndStart();
    }
  };

  const resetAndStart = () => {
    const s2 = getRandomQuestions(stage2Pool, 3);
    const s3 = getRandomQuestions(stage3Pool, 3);
    dailyQuestions = [...stage1Questions, ...s2, ...s3];
    currentIndex = 0;
    saveState();
    renderQuestion();
  };

  const saveState = () => {
    localStorage.setItem('techo_date', getTodayString());
    localStorage.setItem('techo_index', currentIndex);
    localStorage.setItem('techo_questions', JSON.stringify(dailyQuestions));
  };

  // 継続日数の更新（完了時に呼ぶ）
  const updateStreak = () => {
    const today = getTodayString();
    const yesterday = getYesterdayString();
    let streak = parseInt(localStorage.getItem('techo_streak')) || 0;
    const lastCompletedDate = localStorage.getItem('techo_last_completed');

    if (lastCompletedDate === yesterday) {
      // 昨日も完了していれば+1
      streak += 1;
    } else if (lastCompletedDate !== today) {
      // 今日初めて完了、かつ昨日やっていなければ1からスタート
      streak = 1;
    }
    // (lastCompletedDate === today) の場合は既に今日カウント済みなので何もしない

    localStorage.setItem('techo_streak', streak);
    localStorage.setItem('techo_last_completed', today);
    return streak;
  };

  const renderResumeConfirm = () => {
    const html = `
      <div class="greeting-text">${getGreeting()}</div>
      <div class="message-text">前回の続きから<br>手帳を開きますか？</div>
      <div class="button-group">
        <button onclick="resume()">＞ はい</button>
        <button class="btn-secondary" onclick="resetAndStart()">＞ いいえ（最初から）</button>
      </div>
    `;
    renderWithFade(html);
  };

  const resume = () => {
    if (currentIndex === 3) renderBranch1();
    else if (currentIndex === 6) renderBranch2();
    else renderQuestion();
  };

  const renderQuestion = () => {
    let stageStr = "";
    let stepNum = 0;
    if (currentIndex < 3) { stageStr = "毎日書くこと"; stepNum = currentIndex + 1; }
    else if (currentIndex < 6) { stageStr = "書きたいとき"; stepNum = currentIndex - 2; }
    else { stageStr = "もっと書きたいとき"; stepNum = currentIndex - 5; }

    const html = `
      <div class="greeting-text">${currentIndex === 0 ? getGreeting() : ""}</div>
      <div class="step-indicator">▼ ${stageStr} (${stepNum}/3)</div>
      <div class="question-text">「${dailyQuestions[currentIndex]}」</div>
      <div class="button-group">
        <button onclick="nextStep()">＞ 書けた！</button>
      </div>
    `;
    renderWithFade(html);
  };

  const nextStep = () => {
    currentIndex++;
    saveState();

    if (currentIndex === 3) {
      renderBranch1();
    } else if (currentIndex === 6) {
      renderBranch2();
    } else if (currentIndex >= 9) {
      const currentStreak = updateStreak();
      renderFinish(currentStreak);
    } else {
      renderQuestion();
    }
  };

  const renderBranch1 = () => {
    const html = `
      <div class="message-text">お疲れ様です。<br>きょうも手帳を書けたね！<br><br>さらに書く？</div>
      <div class="button-group">
        <button onclick="renderQuestion()">＞ はい</button>
        <button class="btn-secondary" onclick="renderFinishEarly()">＞ 今日はここまで</button>
      </div>
    `;
    renderWithFade(html);
  };

  const renderBranch2 = () => {
    const html = `
      <div class="message-text">素晴らしいです！<br>頭の中が整理されたね。<br><br>もっと深掘りして書く？</div>
      <div class="button-group">
        <button onclick="renderQuestion()">＞ もっと書く</button>
        <button class="btn-secondary" onclick="renderFinishEarly()">＞ 今日はここまで</button>
      </div>
    `;
    renderWithFade(html);
  };

  const renderFinishEarly = () => {
    currentIndex = 9; 
    saveState();
    const currentStreak = updateStreak();
    renderFinish(currentStreak);
  };

  const renderFinish = (streak) => {
    // 画面再読み込み時などで引数がない場合はローカルストレージから取得
    if (streak === undefined) {
      streak = parseInt(localStorage.getItem('techo_streak')) || 1;
    }
    const html = `
      <div class="message-text">お疲れ様！<br>手帳と向き合う、<br>素敵な時間が過ごせたね。</div>
      <div class="streak-text">★ れんぞく ${streak}日目！ ★</div>
      <div class="button-group">
        <button class="btn-secondary" onclick="resetAndStart()">＞ 最初からやり直す</button>
      </div>
    `;
    renderWithFade(html);
  };

  initApp();
</script>

</body>
</html>
