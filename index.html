<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LOGBOY - まいにちのきろく</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DotGothic16&display=swap" rel="stylesheet">
<style>
  /* 全体設定 */
  body {
    background-color: #000000;
    color: #FFFFFF;
    font-family: 'DotGothic16', sans-serif;
    margin: 0;
    padding: 0;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    -webkit-font-smoothing: none; 
    -moz-osx-font-smoothing: grayscale;
    font-smooth: never;
    text-rendering: optimizeSpeed;
  }

  /* アプリ全体のコンテナ */
  #app-container {
    max-width: 480px;
    width: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px;
    box-sizing: border-box;
    opacity: 0;
    transition: opacity 0.5s ease-in-out;
  }

  /* ヘッダーエリア */
  header {
    text-align: center;
    margin-bottom: 20px;
  }

  #app-title {
    font-size: 2.5rem;
    margin: 0 0 10px 0;
    letter-spacing: 0.1em;
  }

  #step-indicator {
    font-size: 1.1rem;
    margin: 0;
    color: #AAAAAA;
  }

  /* メインコンテンツエリア */
  main {
    width: 100%;
    margin-bottom: 30px;
  }

  /* 黄色のメッセージウィンドウ */
  #message-window {
    background-color: #ECC42D;
    border: 8px solid;
    border-image: url('data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAgAAAAICAYAAADED76LAAAAPElEQVQoU2NkYGBgYGJkZGT4//8/AxMTE8P///8ZmJiYGP7//8/AxMTw//9/BiYmBiaGJ4YvBiYmBiaGLwYmBgaGJ4YfBgYmBiaGHwYGCAYGAAEAABAAAAA=') 1;
    padding: 25px 25px 45px 25px; /* 下部に▼用の余白を確保 */
    box-sizing: border-box;
    position: relative;
    box-shadow: 4px 4px 0px #333333;
    min-height: 160px; /* ウィンドウの高さがガタガタ変わらないように固定 */
  }

  /* ウィンドウ内のテキスト */
  #message-text {
    color: #000000;
    font-size: 1.2rem;
    margin: 0;
    line-height: 1.6;
    letter-spacing: 0.05em;
  }

  /* 点滅するカーソル（右下固定） */
  .blinking-cursor {
    color: #000000;
    font-size: 1.5rem;
    position: absolute;
    right: 20px;
    bottom: 15px;
    animation: blink 1s step-start infinite;
    display: none; /* 初期は非表示（文字入力後に表示） */
  }

  /* フッター（ボタン）エリア */
  footer {
    width: 100%;
    display: flex;
    justify-content: space-between;
    box-sizing: border-box;
    padding: 0 10px;
    gap: 15px;
  }

  /* アクションボタンの共通設定 */
  .action-btn {
    background-color: #000000;
    color: #FFFFFF;
    border: 2px solid #FFFFFF;
    font-family: 'DotGothic16', sans-serif;
    font-size: 1.1rem;
    padding: 15px 20px;
    cursor: pointer;
    display: flex;
    align-items: center;
    transition: background-color 0.1s;
    flex: 1; /* ボタンの幅を均等に */
    justify-content: center; /* テキストを中央寄せにしたい場合はcenter。左ならflex-start */
  }

  /* CSSで描画するピクセルアロー（▶） */
  .pixel-arrow {
    display: inline-block;
    width: 4px;
    height: 4px;
    background: currentColor;
    /* 影を使ってドットを並べ、矢印の形を作る */
    box-shadow: 
      0 4px currentColor, 0 8px currentColor, 0 12px currentColor, 0 16px currentColor,
      4px 4px currentColor, 4px 8px currentColor, 4px 12px currentColor,
      8px 8px currentColor;
    margin-right: 18px;
    transform: translateY(-8px); /* 位置の微調整 */
  }

  .action-btn:hover {
    background-color: #333333;
  }

  /* 終了ボタン（グレー） */
  .secondary-btn {
    border-color: #888888;
    color: #888888;
  }
  .secondary-btn:hover {
    background-color: #222222;
  }

  /* アニメーション用クラス */
  .fade-in {
    opacity: 1 !important;
  }

  @keyframes blink {
    50% { opacity: 0; }
  }
</style>
</head>
<body>

<div id="app-container">
  <header>
    <h1 id="app-title">LOGBOY</h1>
    <p id="step-indicator">【 まいにち かくこと 1/3 】</p>
  </header>
  <main>
    <div id="message-window">
      <p id="message-text">
        </p>
      <div id="blinking-cursor">▼</div>
    </div>
  </main>
  <footer>
    <button id="primary-btn" class="action-btn" onclick="nextStep()">
      <span class="pixel-arrow"></span><span id="primary-btn-text">かけた！</span>
    </button>
    <button id="secondary-btn" class="action-btn secondary-btn" onclick="finishEarly()">
      <span class="pixel-arrow"></span><span id="secondary-btn-text">きょうは ここまで</span>
    </button>
  </footer>
</div>

<script>
  let currentState = 0; 
  let dailyQuestions = []; 
  let typeWriterTimer; 

  const stage2Pool = [
      "今日達成したこと、出来たことは？",
      "今日の反省点、改善点は？",
      "今日の発見、気づきは？"
  ];
  const stage3Pool = [
      "３ヶ月後の自分の姿はどうなっていたい？",
      "今日のニュース",
      "今日いらついたこと"
  ];

  const appContainer = document.getElementById('app-container');
  const messageWindow = document.getElementById('message-window');
  const messageText = document.getElementById('message-text');
  const blinkingCursor = document.getElementById('blinking-cursor');
  const stepIndicator = document.getElementById('step-indicator');
  const primaryBtn = document.getElementById('primary-btn');
  const secondaryBtn = document.getElementById('secondary-btn');
  const primaryBtnTextSpan = document.getElementById('primary-btn-text');

  const getRandomQuestions = (pool, count) => {
      const shuffled = [...pool].sort(() => 0.5 - Math.random());
      return shuffled.slice(0, count);
  };

  const getGreeting = () => {
      const hour = new Date().getHours();
      if (hour >= 5 && hour < 11) return "おはよう！";
      if (hour >= 11 && hour < 17) return "こんにちは！";
      return "きょうも おつかれさま！";
  };

  const initApp = () => {
      const s2 = getRandomQuestions(stage2Pool, 3);
      const s3 = getRandomQuestions(stage3Pool, 3);
      dailyQuestions = [...s2, ...s3];
      currentState = 0;

      appContainer.classList.add('fade-in');
      renderView();
  };

  const renderView = () => {
      if (typeWriterTimer) clearInterval(typeWriterTimer);
      blinkingCursor.style.display = 'none'; // タイピング中はカーソルを隠す

      let stepText = "";
      let primaryBtnText = "かけた！";
      let textToType = "";
      let isFinal = false; 

      // ウィンドウのフェードインアニメーション
      messageWindow.style.opacity = 0;
      void messageWindow.offsetWidth; 
      messageWindow.style.opacity = 1;
      messageWindow.style.transition = 'opacity 0.2s ease-in';

      // ボタンのアクションをデフォルトで進む処理に設定
      primaryBtn.onclick = nextStep;

      switch (currentState) {
          case 0:
              stepText = "まいにち かくこと 1/3";
              textToType = `${getGreeting()} さっそく\nきろくを はじめよう！\n\n「きょう(あした)のスケジュールは？」`;
              break;
          case 1:
              stepText = "まいにち かくこと 2/3";
              textToType = "「TODO、タスクは？」";
              break;
          case 2:
              stepText = "まいにち かくこと 3/3";
              textToType = "「今日の目標は？」";
              break;
          case 3:
              stepText = "まいにち 完了";
              textToType = "おつかれさま！\nきほんの きろくが おわったね。\n\nさらに かいていくかい？";
              primaryBtnText = "はい";
              break;
          case 4:
              stepText = "かきたいとき 1/3";
              textToType = `「${dailyQuestions[0]}」`;
              break;
          case 5:
              stepText = "かきたいとき 2/3";
              textToType = `「${dailyQuestions[1]}」`;
              break;
          case 6:
              stepText = "かきたいとき 3/3";
              textToType = `「${dailyQuestions[2]}」`;
              break;
          case 7:
              stepText = "かきたいとき 完了";
              textToType = "すばらしい！\nあたまのなかが せいりされたね。\n\nもっと ふかぼり してみる？";
              primaryBtnText = "はい";
              break;
          case 8:
              stepText = "もっとかきたい 1/3";
              textToType = `「${dailyQuestions[3]}」`;
              break;
          case 9:
              stepText = "もっとかきたい 2/3";
              textToType = `「${dailyQuestions[4]}」`;
              break;
          case 10:
              stepText = "もっとかきたい 3/3";
              textToType = `「${dailyQuestions[5]}」`;
              break;
          case 11: 
              isFinal = true;
              stepText = "きろく かんりょう";
              textToType = "おつかれさま！\nきょうの ぼうけんは ここまでだ。\nゆっくり やすんでね。";
              primaryBtnText = "さいしょから やりなおす";
              primaryBtn.onclick = initApp; // ボタンのアクションを初期化に変更
              break;
          default:
              break;
      }

      stepIndicator.innerText = `【 ${stepText} 】`;
      primaryBtnTextSpan.innerText = primaryBtnText;

      // 完了画面のUI調整
      if (isFinal) {
          secondaryBtn.style.display = 'none';
      } else {
          secondaryBtn.style.display = 'flex';
      }

      typeWriter(textToType);
  };

  const nextStep = () => {
      currentState++;
      renderView();
  };

  const finishEarly = () => {
      currentState = 11; 
      renderView();
  };

  const typeWriter = (text, speed = 60) => {
      let i = 0;
      messageText.innerHTML = "";
      
      typeWriterTimer = setInterval(() => {
          if (i < text.length) {
              if (text.substr(i, 4) === '<br>') {
                  messageText.innerHTML += '<br>';
                  i += 4;
              } else if (text.charAt(i) === '\n') {
                  messageText.innerHTML += '<br>';
                  i++;
              } else {
                  messageText.innerHTML += text.charAt(i);
                  i++;
              }
          } else {
              clearInterval(typeWriterTimer);
              // タイピングが終わったら右下のカーソルを表示
              blinkingCursor.style.display = 'block';
          }
      }, speed);
  };

  initApp();
</script>

</body>
</html>
