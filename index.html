<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LOGBOY</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DotGothic16&display=swap" rel="stylesheet">
<style>
  body {
    background-color: #111111; /* レトロゲーム風の黒背景 */
    color: #FFFFEE; /* 少し黄ばんだ白（レトロ感） */
    /* 文字のドット感を出すためのCSS */
    font-family: 'DotGothic16', sans-serif;
    -webkit-font-smoothing: none;
    -moz-osx-font-smoothing: grayscale;
    font-smooth: never;
    text-rendering: optimizeSpeed;

    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    margin: 0;
    padding: 20px;
    box-sizing: border-box;
    text-align: center;
    image-rendering: pixelated; /* 画面全体のドット感を強調 */
  }
  #app-container {
    max-width: 400px;
    width: 100%;
    /* 完全にカクカクした枠線と立体感 */
    border: 4px solid #FFFFEE; 
    box-shadow: 6px 6px 0px #333333; /* ドット絵っぽい影 */
    border-radius: 0px; 
    padding: 30px 20px;
    background-color: #000000;
    position: relative;
    text-align: left;
  }
  /* CSSで描くキロクロンのドット絵（魔法の本） */
  .pixel-icon {
    display: inline-block;
    width: 1px;
    height: 1px;
    box-shadow: 
      /* 白枠 */
      3px 1px #FFFFEE, 4px 1px #FFFFEE, 5px 1px #FFFFEE, 6px 1px #FFFFEE, 7px 1px #FFFFEE, 8px 1px #FFFFEE, 9px 1px #FFFFEE, 10px 1px #FFFFEE, 11px 1px #FFFFEE, 12px 1px #FFFFEE,
      2px 2px #FFFFEE, 13px 2px #FFFFEE,
      1px 3px #FFFFEE, 14px 3px #FFFFEE,
      1px 4px #FFFFEE, 14px 4px #FFFFEE,
      1px 5px #FFFFEE, 14px 5px #FFFFEE,
      1px 6px #FFFFEE, 14px 6px #FFFFEE,
      1px 7px #FFFFEE, 14px 7px #FFFFEE,
      1px 8px #FFFFEE, 14px 8px #FFFFEE,
      1px 9px #FFFFEE, 14px 9px #FFFFEE,
      1px 10px #FFFFEE, 14px 10px #FFFFEE,
      1px 11px #FFFFEE, 14px 11px #FFFFEE,
      2px 12px #FFFFEE, 13px 12px #FFFFEE,
      3px 13px #FFFFEE, 4px 13px #FFFFEE, 5px 13px #FFFFEE, 6px 13px #FFFFEE, 7px 13px #FFFFEE, 8px 13px #FFFFEE, 9px 13px #FFFFEE, 10px 13px #FFFFEE, 11px 13px #FFFFEE, 12px 13px #FFFFEE,
      /* 厚み */
      3px 14px #666, 4px 14px #666, 5px 14px #666, 6px 14px #666, 7px 14px #666, 8px 14px #666, 9px 14px #666, 10px 14px #666, 11px 14px #666, 12px 14px #666,
      /* 中央のエンブレム（黄色） */
      7px 5px #FFD700, 8px 5px #FFD700,
      6px 6px #FFD700, 9px 6px #FFD700,
      7px 7px #FFD700, 8px 7px #FFD700,
      7px 8px #FFD700, 8px 8px #FFD700,
      7px 9px #FFD700, 8px 9px #FFD700;
    transform: scale(3); /* ドットのサイズを調整 */
    margin-bottom: 30px; /* 挨拶画面での余白 */
  }
  /* 質問画面での小さなアイコン */
  .pixel-icon-small {
    transform: scale(2);
    margin-right: 15px;
    margin-bottom: 0px;
    vertical-align: middle;
  }
  .character-name {
    font-size: 1.1rem;
    color: #66B2FF; /* ファミコン風の青 */
    margin-bottom: 15px;
  }
  .character-header {
    display: flex;
    align-items: center;
    margin-bottom: 20px;
  }
  .greeting-text {
    font-size: 1.1rem;
    color: #AAAAAA;
    margin-bottom: 20px;
    text-align: center;
  }
  .question-text {
    font-size: 1.4rem;
    margin-bottom: 30px;
    line-height: 1.6;
    letter-spacing: 0.05em;
  }
  .message-text {
    font-size: 1.3rem;
    margin-bottom: 30px;
    line-height: 1.6;
  }
  .streak-text {
    font-size: 1.5rem;
    color: #FFD700; /* ゴールド（継続） */
    margin-top: 20px;
    margin-bottom: 20px;
    text-align: center;
  }
  .button-group {
    display: flex;
    flex-direction: column;
    gap: 15px;
    margin-top: 20px;
  }
  button {
    background-color: #000000;
    color: #FFFFEE;
    border: 2px solid #FFFFEE;
    padding: 15px;
    font-size: 1.2rem;
    font-family: 'DotGothic16', sans-serif;
    border-radius: 0px; /* ボタンも完全に四角く */
    cursor: pointer;
    transition: all 0.1s;
    text-align: left; 
    padding-left: 20px;
    -webkit-font-smoothing: none;
    -moz-osx-font-smoothing: grayscale;
    font-smooth: never;
  }
  button:hover, button:active {
    background-color: #FFFFEE;
    color: #000000;
  }
  /* ホバー時のカーソル */
  button .cursor {
    visibility: hidden;
    margin-right: 10px;
  }
  button:hover .cursor, button:active .cursor {
    visibility: visible;
  }
  .btn-secondary {
    border-color: #888888;
    color: #888888;
  }
  .btn-secondary:hover, .btn-secondary:active {
    background-color: #888888;
    color: #000000;
  }
  .step-indicator {
    font-size: 1rem;
    color: #888888;
    margin-bottom: 15px;
    text-align: center;
  }
  .blinking-cursor {
    animation: blinker 1s step-start infinite;
    font-size: 1.2rem;
    margin-top: 10px;
    color: #FFFFEE;
    text-align: center;
  }
  @keyframes blinker {
    50% { opacity: 0; }
  }
  /* フェードインアニメーションを少し速く、カクカクさせる */
  .fade-in {
    animation: fadeInAnimation 0.2s step-end forwards;
  }
  @keyframes fadeInAnimation {
    0% { opacity: 0; transform: translateY(2px); }
    100% { opacity: 1; transform: translateY(0); }
  }
</style>
</head>
<body>

<div id="app-container">
  <div id="display-area">
    </div>
</div>

<script>
  const stage1Questions = [
    "きょう(あした)のスケジュールは？",
    "今日のTODOやタスクは？",
    "今日の目標は？"
  ];

  const stage2Pool = [
    "今日達成したこと、出来たことは？",
    "今日の発見、新しく知ったことは？",
    "今日一番美味しかったものは？",
    "今日、少しでも気分が上がった瞬間は？",
    "今日、誰かに「ありがとう」と言いたいことは？",
    "今日の自分に点数をつけるなら何点？その理由は？",
    "今日一番笑ったことは？",
    "今日の自分を褒めるとしたらどこ？",
    "今日、一番頑張ったなと思うことは？",
    "今日聴いて心地よかった音楽や音は？",
    "今日、新しく見つけたお気に入りの場所やモノは？"
  ];

  const stage3Pool = [
    "３ヶ月後の自分はどうなっていたい？",
    "今、一番やりたいこと・行きたい場所は？",
    "最近、心に残った言葉やニュースは？",
    "もし明日が完全に自由な1日だったら何をする？",
    "最近買ってよかったもの、または欲しいものは？",
    "今抱えているモヤモヤを一つだけ書き出すとしたら？",
    "今週末、時間ができたらやりたいことは？",
    "最近、少しでも成長したなと感じる部分は？",
    "今、一番感謝を伝えたい人は誰？",
    "もし自由に使えるお金があったら何に使う？",
    "1年後の自分に向けて、一言メッセージを書くなら？",
    "最近新しく始めたいと思っている習慣や趣味はある？"
  ];

  let dailyQuestions = []; 
  let currentIndex = 0;    

  const displayArea = document.getElementById('display-area');

  const getTodayString = () => {
    const d = new Date();
    return `${d.getFullYear()}-${d.getMonth()+1}-${d.getDate()}`;
  };

  const getYesterdayString = () => {
    const d = new Date();
    d.setDate(d.getDate() - 1);
    return `${d.getFullYear()}-${d.getMonth()+1}-${d.getDate()}`;
  };

  const getRandomQuestions = (pool, count) => {
    const shuffled = [...pool].sort(() => 0.5 - Math.random());
    return shuffled.slice(0, count);
  };

  const getGreeting = () => {
    const hour = new Date().getHours();
    if (hour >= 5 && hour < 11) {
      return "おはよう！";
    } else if (hour >= 11 && hour < 17) {
      return "やあ、こんにちは！";
    } else {
      return "きょうも おつかれさま！";
    }
  };

  // キャラクター（魔法の本）のドット絵HTML
  const getPixelIconHtml = (isSmall = false) => {
    return `<div class="pixel-icon ${isSmall ? 'pixel-icon-small' : ''}"></div>`;
  };

  const renderWithFade = (htmlContent) => {
    displayArea.classList.remove('fade-in');
    void displayArea.offsetWidth; 
    displayArea.innerHTML = htmlContent;
    displayArea.classList.add('fade-in');
  };

  const initApp = () => {
    const savedDate = localStorage.getItem('techo_date');
    const savedIndex = localStorage.getItem('techo_index');
    const savedQuestions = localStorage.getItem('techo_questions');
    const today = getTodayString();

    if (savedDate === today && savedQuestions && savedIndex !== null) {
      dailyQuestions = JSON.parse(savedQuestions);
      currentIndex = parseInt(savedIndex);
      
      if (currentIndex > 0 && currentIndex < 9) {
        renderResumeConfirm();
      } else if (currentIndex >= 9) {
        renderFinish(); 
      } else {
        renderQuestion();
      }
    } else {
      resetAndStart();
    }
  };

  const resetAndStart = () => {
    const s2 = getRandomQuestions(stage2Pool, 3);
    const s3 = getRandomQuestions(stage3Pool, 3);
    dailyQuestions = [...stage1Questions, ...s2, ...s3];
    currentIndex = 0;
    saveState();
    renderQuestion();
  };

  const saveState = () => {
    localStorage.setItem('techo_date', getTodayString());
    localStorage.setItem('techo_index', currentIndex);
    localStorage.setItem('techo_questions', JSON.stringify(dailyQuestions));
  };

  const updateStreak = () => {
    const today = getTodayString();
    const yesterday = getYesterdayString();
    let streak = parseInt(localStorage.getItem('techo_streak')) || 0;
    const lastCompletedDate = localStorage.getItem('techo_last_completed');

    if (lastCompletedDate === yesterday) {
      streak += 1;
    } else if (lastCompletedDate !== today) {
      streak = 1;
    }

    localStorage.setItem('techo_streak', streak);
    localStorage.setItem('techo_last_completed', today);
    return streak;
  };

  const renderResumeConfirm = () => {
    const html = `
      <div style="text-align: center;">${getPixelIconHtml()}</div>
      <div class="character-name" style="text-align: center;">キロクロン</div>
      <div class="message-text">「${getGreeting()}<br>ぜんかいの つづきから<br>てちょうを ひらくかい？」</div>
      <div class="blinking-cursor">▼</div>
      <div class="button-group">
        <button onclick="resume()"><span class="cursor">▶</span>はい</button>
        <button class="btn-secondary" onclick="resetAndStart()"><span class="cursor">▶</span>いいえ（さいしょから）</button>
      </div>
    `;
    renderWithFade(html);
  };

  const resume = () => {
    if (currentIndex === 3) renderBranch1();
    else if (currentIndex === 6) renderBranch2();
    else renderQuestion();
  };

  const renderQuestion = () => {
    let stageStr = "";
    let stepNum = 0;
    if (currentIndex < 3) { stageStr = "まいにち かくこと"; stepNum = currentIndex + 1; }
    else if (currentIndex < 6) { stageStr = "かきたい とき"; stepNum = currentIndex - 2; }
    else { stageStr = "もっと かきたい とき"; stepNum = currentIndex - 5; }

    // 最初の質問時のみ挨拶を表示
    const greetingHtml = currentIndex === 0 ? `
      <div style="text-align: center;">${getPixelIconHtml()}</div>
      <div class="character-name" style="text-align: center;">キロクロン</div>
      <div class="message-text">「${getGreeting()}<br>さっそく きろくを はじめよう！」</div>
    ` : "";

    const html = `
      ${greetingHtml}
      <div class="step-indicator">【 ${stageStr} ${stepNum}/3 】</div>
      <div class="character-header">
        ${getPixelIconHtml(true)}
        <div class="character-name" style="margin-bottom: 0;">キロクロン</div>
      </div>
      <div class="question-text">「${dailyQuestions[currentIndex]}」</div>
      <div class="blinking-cursor">▼</div>
      <div class="button-group">
        <button onclick="nextStep()"><span class="cursor">▶</span>かけた！</button>
      </div>
    `;
    renderWithFade(html);
  };

  const nextStep = () => {
    currentIndex++;
    saveState();

    if (currentIndex === 3) {
      renderBranch1();
    } else if (currentIndex === 6) {
      renderBranch2();
    } else if (currentIndex >= 9) {
      const currentStreak = updateStreak();
      renderFinish(currentStreak);
    } else {
      renderQuestion();
    }
  };

  const renderBranch1 = () => {
    const html = `
      <div class="character-header">
        ${getPixelIconHtml(true)}
        <div class="character-name" style="margin-bottom: 0;">キロクロン</div>
      </div>
      <div class="message-text">「おつかれさま！<br>きほんの きろくが おわったね。<br><br>さらに かいていくかい？」</div>
      <div class="blinking-cursor">▼</div>
      <div class="button-group">
        <button onclick="renderQuestion()"><span class="cursor">▶</span>はい</button>
        <button class="btn-secondary" onclick="renderFinishEarly()"><span class="cursor">▶</span>きょうは ここまで</button>
      </div>
    `;
    renderWithFade(html);
  };

  const renderBranch2 = () => {
    const html = `
      <div class="character-header">
        ${getPixelIconHtml(true)}
        <div class="character-name" style="margin-bottom: 0;">キロクロン</div>
      </div>
      <div class="message-text">「すばらしい！<br>あたまの なかが せいり されたね。<br><br>もっと ふかぼり してみる？」</div>
      <div class="blinking-cursor">▼</div>
      <div class="button-group">
        <button onclick="renderQuestion()"><span class="cursor">▶</span>もっと かく</button>
        <button class="btn-secondary" onclick="renderFinishEarly()"><span class="cursor">▶</span>きょうは ここまで</button>
      </div>
    `;
    renderWithFade(html);
  };

  const renderFinishEarly = () => {
    currentIndex = 9; 
    saveState();
    const currentStreak = updateStreak();
    renderFinish(currentStreak);
  };

  const renderFinish = (streak) => {
    if (streak === undefined) {
      streak = parseInt(localStorage.getItem('techo_streak')) || 1;
    }
    const html = `
      <div style="text-align: center;">${getPixelIconHtml()}</div>
      <div class="character-name" style="text-align: center;">キロクロン</div>
      <div class="message-text">「おつかれさま！<br>てちょうと むきあう、<br>すてきな じかんが すごせたね。」</div>
      <div class="streak-text">★ れんぞく ${streak}にちめ！ ★</div>
      <div class="blinking-cursor">▼</div>
      <div class="button-group">
        <button class="btn-secondary" onclick="resetAndStart()"><span class="cursor">▶</span>さいしょから やりなおす</button>
      </div>
    `;
    renderWithFade(html);
  };

  initApp();
</script>

</body>
</html>
