<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>手帳サポートアプリ</title>
<style>
  body {
    background-color: #FDFBF7; /* 手帳の紙のような温かい色 */
    color: #333333;
    font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    margin: 0;
    padding: 20px;
    box-sizing: border-box;
    text-align: center;
  }
  #app-container {
    max-width: 400px;
    width: 100%;
  }
  h1 {
    font-size: 1.2rem;
    font-weight: normal;
    margin-bottom: 30px;
    line-height: 1.5;
  }
  .content-list {
    text-align: left;
    background: #ffffff;
    padding: 20px;
    border-radius: 12px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.05);
    margin-bottom: 30px;
  }
  .content-list p {
    margin: 10px 0;
    font-size: 1.1rem;
    border-bottom: 1px dashed #e0e0e0;
    padding-bottom: 8px;
  }
  .button-group {
    display: flex;
    flex-direction: column;
    gap: 15px;
  }
  button {
    background-color: #E86452; /* 暖かみのあるアクセントカラー */
    color: white;
    border: none;
    padding: 15px;
    font-size: 1.1rem;
    border-radius: 30px;
    cursor: pointer;
    box-shadow: 0 4px 6px rgba(232, 100, 82, 0.2);
    transition: transform 0.1s;
  }
  button:active {
    transform: translateY(2px);
    box-shadow: 0 2px 3px rgba(232, 100, 82, 0.2);
  }
  .btn-secondary {
    background-color: #d1d1d1;
    color: #555;
    box-shadow: none;
  }
</style>
</head>
<body>

<div id="app-container">
  <div id="display-area">
    </div>
</div>

<script>
  // 状態管理
  let currentState = 0;
  // 0: 初期化/確認, 1: 機能①, 2: 分岐①, 3: 機能②, 4: 分岐②, 5: 機能③, 6: 完了

  const displayArea = document.getElementById('display-area');

  // 今日の日付を取得（YYYY-MM-DD形式）
  const getTodayString = () => {
    const d = new Date();
    return `${d.getFullYear()}-${d.getMonth()+1}-${d.getDate()}`;
  };

  // アプリ起動時のチェック
  const initApp = () => {
    const savedDate = localStorage.getItem('techo_date');
    const savedState = localStorage.getItem('techo_state');
    const today = getTodayString();

    if (savedDate === today && savedState !== null && parseInt(savedState) > 1 && parseInt(savedState) < 6) {
      // 同じ日で、かつ途中の状態がある場合
      renderResumeConfirm(parseInt(savedState));
    } else {
      // 日付が変わっている、または最初からの場合
      resetAndStart();
    }
  };

  const saveState = (state) => {
    localStorage.setItem('techo_date', getTodayString());
    localStorage.setItem('techo_state', state);
    currentState = state;
  };

  const resetAndStart = () => {
    saveState(1);
    renderStep1();
  };

  const renderResumeConfirm = (savedState) => {
    displayArea.innerHTML = `
      <h1>前回の続きから行いますか？</h1>
      <div class="button-group">
        <button onclick="resume(${savedState})">はい（続きから）</button>
        <button class="btn-secondary" onclick="resetAndStart()">いいえ（最初から）</button>
      </div>
    `;
  };

  const resume = (state) => {
    currentState = state;
    if(state === 2) renderBranch1();
    else if(state === 3) renderStep2();
    else if(state === 4) renderBranch2();
    else if(state === 5) renderStep3();
    else renderStep1();
  };

  const renderStep1 = () => {
    displayArea.innerHTML = `
      <h1>まず、手帳に書く３つのこと</h1>
      <div class="content-list">
        <p>1. きょう(あした)のスケジュール</p>
        <p>2. TODO、タスク</p>
        <p>3. 今日の目標</p>
      </div>
      <div class="button-group">
        <button onclick="goToBranch1()">書けた！</button>
      </div>
    `;
  };

  const goToBranch1 = () => {
    saveState(2);
    renderBranch1();
  };

  const renderBranch1 = () => {
    displayArea.innerHTML = `
      <h1>お疲れ様です！<br>さらに手帳を書きますか？</h1>
      <div class="button-group">
        <button onclick="goToStep2()">はい</button>
        <button class="btn-secondary" onclick="finishApp()">いいえ</button>
      </div>
    `;
  };

  const goToStep2 = () => {
    saveState(3);
    renderStep2();
  };

  const renderStep2 = () => {
    displayArea.innerHTML = `
      <h1>書きたいときに書くこと3つ</h1>
      <div class="content-list">
        <p>1. 今日達成したこと、出来たこと</p>
        <p>2. 今日の反省点、改善点</p>
        <p>3. 今日の発見、気づき</p>
      </div>
      <div class="button-group">
        <button onclick="goToBranch2()">書けた！</button>
      </div>
    `;
  };

  const goToBranch2 = () => {
    saveState(4);
    renderBranch2();
  };

  const renderBranch2 = () => {
    displayArea.innerHTML = `
      <h1>素晴らしいです！<br>もっと手帳を書きますか？</h1>
      <div class="button-group">
        <button onclick="goToStep3()">はい</button>
        <button class="btn-secondary" onclick="finishApp()">いいえ</button>
      </div>
    `;
  };

  const goToStep3 = () => {
    saveState(5);
    renderStep3();
  };

  const renderStep3 = () => {
    displayArea.innerHTML = `
      <h1>もっと書きたい時に書く３つ</h1>
      <div class="content-list">
        <p>1. ３ヶ月後の自分の姿</p>
        <p>2. 今日のニュース</p>
        <p>3. 今日いらついたこと</p>
      </div>
      <div class="button-group">
        <button onclick="finishApp()">完了！</button>
      </div>
    `;
  };

  const finishApp = () => {
    saveState(6);
    displayArea.innerHTML = `
      <h1>お疲れ様でした！<br>今日も手帳が書けましたね。</h1>
      <div class="button-group">
        <button class="btn-secondary" onclick="resetAndStart()">最初からやり直す</button>
      </div>
    `;
  };

  // アプリ起動
  initApp();
</script>

</body>
</html>
