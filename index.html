<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LOGBOY</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DotGothic16&display=swap" rel="stylesheet">
<style>
  body {
    background-color: #111111; 
    color: #FFFFFF;
    font-family: 'DotGothic16', sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    margin: 0;
    padding: 20px;
    box-sizing: border-box;
    text-align: center;
  }
  #app-container {
    max-width: 400px;
    width: 100%;
    border: 6px double #FFFFFF; 
    border-radius: 0px; 
    padding: 30px 20px;
    background-color: #000000;
    position: relative;
    text-align: left; /* RPGのウィンドウらしく全体を左寄せベースに */
  }
  .character-name {
    font-size: 1.1rem;
    color: #66B2FF; /* 少し青みがかった色でキャラクター名っぽく */
    margin-bottom: 10px;
  }
  .greeting-text {
    font-size: 1.1rem;
    color: #AAAAAA;
    margin-bottom: 20px;
    text-align: center;
  }
  .question-text {
    font-size: 1.4rem;
    margin-bottom: 30px;
    line-height: 1.6;
    letter-spacing: 0.05em;
  }
  .message-text {
    font-size: 1.3rem;
    margin-bottom: 30px;
    line-height: 1.6;
  }
  .streak-text {
    font-size: 1.5rem;
    color: #FFD700;
    margin-top: 20px;
    margin-bottom: 20px;
    text-align: center;
  }
  .button-group {
    display: flex;
    flex-direction: column;
    gap: 15px;
    margin-top: 20px;
  }
  button {
    background-color: #000000;
    color: #FFFFFF;
    border: 2px solid #FFFFFF;
    padding: 15px;
    font-size: 1.2rem;
    font-family: 'DotGothic16', sans-serif;
    border-radius: 0px; 
    cursor: pointer;
    transition: all 0.2s;
    text-align: left; 
    padding-left: 20px;
  }
  button:hover, button:active {
    background-color: #FFFFFF;
    color: #000000;
  }
  .btn-secondary {
    border-color: #888888;
    color: #888888;
  }
  .step-indicator {
    font-size: 1rem;
    color: #888888;
    margin-bottom: 15px;
    text-align: center;
  }
  .blinking-cursor {
    animation: blinker 1s step-start infinite;
    font-size: 1.2rem;
    margin-top: 10px;
    color: #FFFFFF;
    text-align: center;
  }
  @keyframes blinker {
    50% { opacity: 0; }
  }
  .fade-in {
    animation: fadeInAnimation 0.3s ease-in forwards;
  }
  @keyframes fadeInAnimation {
    0% { opacity: 0; transform: translateY(5px); }
    100% { opacity: 1; transform: translateY(0); }
  }
</style>
</head>
<body>

<div id="app-container">
  <div id="display-area">
    </div>
</div>

<script>
  const stage1Questions = [
    "きょう(あした)のスケジュールは？",
    "今日のTODOやタスクは？",
    "今日の目標は？"
  ];

  const stage2Pool = [
    "今日達成したこと、出来たことは？",
    "今日の発見、新しく知ったことは？",
    "今日一番美味しかったものは？",
    "今日、少しでも気分が上がった瞬間は？",
    "今日、誰かに「ありがとう」と言いたいことは？",
    "今日の自分に点数をつけるなら何点？その理由は？",
    "今日一番笑ったことは？",
    "今日の自分を褒めるとしたらどこ？",
    "今日、一番頑張ったなと思うことは？",
    "今日聴いて心地よかった音楽や音は？",
    "今日、新しく見つけたお気に入りの場所やモノは？"
  ];

  const stage3Pool = [
    "３ヶ月後の自分はどうなっていたい？",
    "今、一番やりたいこと・行きたい場所は？",
    "最近、心に残った言葉やニュースは？",
    "もし明日が完全に自由な1日だったら何をする？",
    "最近買ってよかったもの、または欲しいものは？",
    "今抱えているモヤモヤを一つだけ書き出すとしたら？",
    "今週末、時間ができたらやりたいことは？",
    "最近、少しでも成長したなと感じる部分は？",
    "今、一番感謝を伝えたい人は誰？",
    "もし自由に使えるお金があったら何に使う？",
    "1年後の自分に向けて、一言メッセージを書くなら？",
    "最近新しく始めたいと思っている習慣や趣味はある？"
  ];

  let dailyQuestions = []; 
  let currentIndex = 0;    

  const displayArea = document.getElementById('display-area');

  const getTodayString = () => {
    const d = new Date();
    return `${d.getFullYear()}-${d.getMonth()+1}-${d.getDate()}`;
  };

  const getYesterdayString = () => {
    const d = new Date();
    d.setDate(d.getDate() - 1);
    return `${d.getFullYear()}-${d.getMonth()+1}-${d.getDate()}`;
  };

  const getRandomQuestions = (pool, count) => {
    const shuffled = [...pool].sort(() => 0.5 - Math.random());
    return shuffled.slice(0, count);
  };

  const getGreeting = () => {
    const hour = new Date().getHours();
    if (hour >= 5 && hour < 11) {
      return "おはよう！";
    } else if (hour >= 11 && hour < 17) {
      return "やあ、こんにちは！";
    } else {
      return "きょうも おつかれさま！";
    }
  };

  const renderWithFade = (htmlContent) => {
    displayArea.classList.remove('fade-in');
    void displayArea.offsetWidth; 
    displayArea.innerHTML = htmlContent;
    displayArea.classList.add('fade-in');
  };

  const initApp = () => {
    const savedDate = localStorage.getItem('techo_date');
    const savedIndex = localStorage.getItem('techo_index');
    const savedQuestions = localStorage.getItem('techo_questions');
    const today = getTodayString();

    if (savedDate === today && savedQuestions && savedIndex !== null) {
      dailyQuestions = JSON.parse(savedQuestions);
      currentIndex = parseInt(savedIndex);
      
      if (currentIndex > 0 && currentIndex < 9) {
        renderResumeConfirm();
      } else if (currentIndex >= 9) {
        renderFinish(); 
      } else {
        renderQuestion();
      }
    } else {
      resetAndStart();
    }
  };

  const resetAndStart = () => {
    const s2 = getRandomQuestions(stage2Pool, 3);
    const s3 = getRandomQuestions(stage3Pool, 3);
    dailyQuestions = [...stage1Questions, ...s2, ...s3];
    currentIndex = 0;
    saveState();
    renderQuestion();
  };

  const saveState = () => {
    localStorage.setItem('techo_date', getTodayString());
    localStorage.setItem('techo_index', currentIndex);
    localStorage.setItem('techo_questions', JSON.stringify(dailyQuestions));
  };

  const updateStreak = () => {
    const today = getTodayString();
    const yesterday = getYesterdayString();
    let streak = parseInt(localStorage.getItem('techo_streak')) || 0;
    const lastCompletedDate = localStorage.getItem('techo_last_completed');

    if (lastCompletedDate === yesterday) {
      streak += 1;
    } else if (lastCompletedDate !== today) {
      streak = 1;
    }

    localStorage.setItem('techo_streak', streak);
    localStorage.setItem('techo_last_completed', today);
    return streak;
  };

  const renderResumeConfirm = () => {
    const html = `
      <div class="character-name">キロクロン</div>
      <div class="message-text">「${getGreeting()}<br>ぜんかいの つづきから<br>てちょうを ひらくかい？」</div>
      <div class="blinking-cursor">▼</div>
      <div class="button-group">
        <button onclick="resume()">▶ はい</button>
        <button class="btn-secondary" onclick="resetAndStart()">▶ いいえ（さいしょから）</button>
      </div>
    `;
    renderWithFade(html);
  };

  const resume = () => {
    if (currentIndex === 3) renderBranch1();
    else if (currentIndex === 6) renderBranch2();
    else renderQuestion();
  };

  const renderQuestion = () => {
    let stageStr = "";
    let stepNum = 0;
    if (currentIndex < 3) { stageStr = "まいにち かくこと"; stepNum = currentIndex + 1; }
    else if (currentIndex < 6) { stageStr = "かきたい とき"; stepNum = currentIndex - 2; }
    else { stageStr = "もっと かきたい とき"; stepNum = currentIndex - 5; }

    const greetingHtml = currentIndex === 0 ? `<div class="character-name">キロクロン</div><div class="message-text">「${getGreeting()}<br>さっそく きろくを はじめよう！」</div>` : "";

    const html = `
      ${greetingHtml}
      <div class="step-indicator">【 ${stageStr} ${stepNum}/3 】</div>
      <div class="character-name">キロクロン</div>
      <div class="question-text">「${dailyQuestions[currentIndex]}」</div>
      <div class="blinking-cursor">▼</div>
      <div class="button-group">
        <button onclick="nextStep()">▶ かけた！</button>
      </div>
    `;
    renderWithFade(html);
  };

  const nextStep = () => {
    currentIndex++;
    saveState();

    if (currentIndex === 3) {
      renderBranch1();
    } else if (currentIndex === 6) {
      renderBranch2();
    } else if (currentIndex >= 9) {
      const currentStreak = updateStreak();
      renderFinish(currentStreak);
    } else {
      renderQuestion();
    }
  };

  const renderBranch1 = () => {
    const html = `
      <div class="character-name">キロクロン</div>
      <div class="message-text">「おつかれさま！<br>きほんの きろくが おわったね。<br><br>さらに かいていくかい？」</div>
      <div class="blinking-cursor">▼</div>
      <div class="button-group">
        <button onclick="renderQuestion()">▶ はい</button>
        <button class="btn-secondary" onclick="renderFinishEarly()">▶ きょうは ここまで</button>
      </div>
    `;
    renderWithFade(html);
  };

  const renderBranch2 = () => {
    const html = `
      <div class="character-name">キロクロン</div>
      <div class="message-text">「すばらしい！<br>あたまの なかが せいり されたね。<br><br>もっと ふかぼり してみる？」</div>
      <div class="blinking-cursor">▼</div>
      <div class="button-group">
        <button onclick="renderQuestion()">▶ もっと かく</button>
        <button class="btn-secondary" onclick="renderFinishEarly()">▶ きょうは ここまで</button>
      </div>
    `;
    renderWithFade(html);
  };

  const renderFinishEarly = () => {
    currentIndex = 9; 
    saveState();
    const currentStreak = updateStreak();
    renderFinish(currentStreak);
  };

  const renderFinish = (streak) => {
    if (streak === undefined) {
      streak = parseInt(localStorage.getItem('techo_streak')) || 1;
    }
    const html = `
      <div class="character-name">キロクロン</div>
      <div class="message-text">「おつかれさま！<br>てちょうと むきあう、<br>すてきな じかんが すごせたね。」</div>
      <div class="streak-text">★ れんぞく ${streak}にちめ！ ★</div>
      <div class="blinking-cursor">▼</div>
      <div class="button-group">
        <button class="btn-secondary" onclick="resetAndStart()">▶ さいしょから やりなおす</button>
      </div>
    `;
    renderWithFade(html);
  };

  initApp();
</script>

</body>
</html>
