<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LOGBOY - まいにちのきろく</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DotGothic16&display=swap" rel="stylesheet">
<style>
  /* 全体設定 */
  body {
    background-color: #000000;
    color: #FFFFFF;
    font-family: 'DotGothic16', sans-serif;
    margin: 0;
    padding: 0;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    /* ドット感を強めるための設定 */
    -webkit-font-smoothing: none; 
    -moz-osx-font-smoothing: grayscale;
    font-smooth: never;
    text-rendering: optimizeSpeed;
  }

  /* アプリ全体のコンテナ */
  #app-container {
    max-width: 480px;
    width: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px;
    box-sizing: border-box;
    /* 初期表示は非表示にしてJSでフェードインさせる */
    opacity: 0;
    transition: opacity 0.5s ease-in-out;
  }

  /* ヘッダーエリア */
  header {
    text-align: center;
    margin-bottom: 20px;
  }

  #app-title {
    font-size: 2.5rem;
    margin: 0 0 10px 0;
  }

  #step-indicator {
    font-size: 1.1rem;
    margin: 0;
    color: #AAAAAA; /* 少し薄い白 */
  }

  /* メインコンテンツエリア */
  main {
    width: 100%;
    margin-bottom: 30px;
  }

  /* 黄色のメッセージウィンドウ（デザインの核心） */
  #message-window {
    background-color: #ECC42D; /* 画像の黄色 */
    /* 画像のピクセル網目枠をCSSで再現 */
    border: 8px solid;
    border-image: url('data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAgAAAAICAYAAADED76LAAAAPElEQVQoU2NkYGBgYGJkZGT4//8/AxMTE8P///8ZmJiYGP7//8/AxMTw//9/BiYmBiaGJ4YvBiYmBiaGLwYmBgaGJ4YfBgYmBiaGHwYGCAYGAAEAABAAAAA=') 1;
    padding: 25px;
    box-sizing: border-box;
    position: relative;
    box-shadow: 4px 4px 0px #333333; /* ドット絵っぽい影 */
  }

  /* ウィンドウ内のテキスト */
  #message-text {
    color: #000000;
    font-size: 1.2rem;
    margin: 0;
    line-height: 1.6;
    letter-spacing: 0.05em;
  }

  /* 点滅するカーソル */
  .blinking-cursor {
    color: #000000;
    display: inline-block;
    margin-left: 2px;
    animation: blink 1s step-start infinite;
  }

  /* フッター（ボタン）エリア */
  footer {
    width: 100%;
    display: flex;
    justify-content: space-between;
    box-sizing: border-box;
    padding: 0 10px;
  }

  /* アクションボタンの共通設定（黒背景、白枠） */
  .action-btn {
    background-color: #000000;
    color: #FFFFFF;
    border: 2px solid #FFFFFF;
    font-family: 'DotGothic16', sans-serif;
    font-size: 1.1rem;
    padding: 12px 18px;
    cursor: pointer;
    display: flex;
    align-items: center;
    transition: background-color 0.1s;
  }

  /* ボタンホバー時 */
  .action-btn:hover {
    background-color: #333333;
  }

  /* ボタン内の矢印（▶︎） */
  .cursor {
    color: #FFFFFF;
    display: inline-block;
    margin-right: 8px;
  }

  /* 終了ボタン（グレー） */
  .secondary-btn {
    border-color: #888888;
    color: #888888;
  }
  .secondary-btn .cursor {
    color: #888888;
  }
  .secondary-btn:hover {
    background-color: #222222;
  }

  /* アニメーション用クラス */
  .fade-in {
    opacity: 1 !important;
  }

  @keyframes blink {
    50% { opacity: 0; }
  }
</style>
</head>
<body>

<div id="app-container">
  <header>
    <h1 id="app-title">LOGBOY</h1>
    <p id="step-indicator">【 まいにち かくこと 1/3 】</p>
  </header>
  <main>
    <div id="message-window">
      <p id="message-text">
        </p>
    </div>
  </main>
  <footer>
    <button id="primary-btn" class="action-btn" onclick="nextStep()"><span class="cursor">▶︎</span>かけた！</button>
    <button id="secondary-btn" class="action-btn secondary-btn" onclick="finishEarly()"><span class="cursor">▶︎</span>きょうは ここまで</button>
  </footer>
</div>

<script>
  // 状態管理
  let currentState = 0; // 0: 初期化/挨拶, 1: TODO, 2: 目標, 3: 分岐①, 4: 第2段階1, ...
  let dailyQuestions = []; // 第2、3段階用の今日の質問（ランダム）
  let typeWriterTimer; // タイプライターのタイマーを保持

  // 質問プール（第2、3段階用）
  const stage2Pool = [
      "今日達成したこと、出来たことは？",
      "今日の反省点、改善点は？",
      "今日の発見、気づきは？"
  ];
  const stage3Pool = [
      "３ヶ月後の自分の姿はどうなっていたい？",
      "今日のニュース",
      "今日いらついたこと"
  ];

  const appContainer = document.getElementById('app-container');
  const messageWindow = document.getElementById('message-window');
  const messageText = document.getElementById('message-text');
  const stepIndicator = document.getElementById('step-indicator');
  const primaryBtn = document.getElementById('primary-btn');
  const secondaryBtn = document.getElementById('secondary-btn');

  // 配列からN個をランダムに選ぶ
  const getRandomQuestions = (pool, count) => {
      const shuffled = [...pool].sort(() => 0.5 - Math.random());
      return shuffled.slice(0, count);
  };

  // 時間帯に応じた挨拶を取得
  const getGreeting = () => {
      const hour = new Date().getHours();
      if (hour >= 5 && hour < 11) return "おはようございます。";
      if (hour >= 11 && hour < 17) return "こんにちは。";
      return "今日もお疲れ様でした。";
  };

  // アプリ起動時の初期化
  const initApp = () => {
      // 第2、3段階用の今日の質問セットを生成
      const s2 = getRandomQuestions(stage2Pool, 3);
      const s3 = getRandomQuestions(stage3Pool, 3);
      dailyQuestions = [...s2, ...s3];
      currentState = 0;

      // アプリ全体をフェードイン
      appContainer.classList.add('fade-in');

      renderView();
  };

  // 現在の状態に基づいてビューを描画
  const renderView = () => {
      // タイプライターのタイマーが動いていればクリア
      if (typeWriterTimer) clearInterval(typeWriterTimer);

      let stepText = "";
      let primaryBtnText = "かけた！";
      let textToType = "";
      let isFinal = false; // 完了画面かどうか

      // ウィンドウのフェードインアニメーション（拡張機能③）
      messageWindow.style.opacity = 0;
      void messageWindow.offsetWidth; // リフローを強制してアニメーションをリセット
      messageWindow.style.opacity = 1;
      messageWindow.style.transition = 'opacity 0.3s ease-in';

      // 状態ごとのテキストと指示を設定
      switch (currentState) {
          case 0: // 初期化/挨拶（画像のデザイン）
              stepText = "まいにち かくこと 1/3";
              // 時間帯の挨拶を追加（拡張機能③）
              textToType = `${getGreeting()} さっそく きろくを はじめみよう！\n\n「きょう(あした)のスケジュールは？」`;
              break;
          case 1: // TODO（コア機能1）
              stepText = "まいにち かくこと 2/3";
              textToType = "「TODO、タスクは？」";
              break;
          case 2: // 目標（コア機能1）
              stepText = "まいにち かくこと 3/3";
              textToType = "「今日の目標は？」";
              break;
          case 3: // 分岐①（コア機能1完了後の提案）
              stepText = "まいにち 完了";
              textToType = "お疲れ様です！<br>さらに手帳を書きますか？";
              primaryBtnText = "はい";
              break;
          case 4: // 第2段階1（コア機能2）
              stepText = "書きたいとき 1/3";
              textToType = `「${dailyQuestions[0]}」`;
              break;
          case 5: // 第2段階2（コア機能2）
              stepText = "書きたいとき 2/3";
              textToType = `「${dailyQuestions[1]}」`;
              break;
          case 6: // 第2段階3（コア機能2）
              stepText = "書きたいとき 3/3";
              textToType = `「${dailyQuestions[2]}」`;
              break;
          case 7: // 分岐②（コア機能2完了後の提案）
              stepText = "書きたいとき 完了";
              textToType = "素晴らしいです！<br>もっと手帳を書きますか？";
              primaryBtnText = "はい";
              break;
          case 8: // 第3段階1（コア機能3）
              stepText = "もっと書きたい 1/3";
              textToType = `「${dailyQuestions[3]}」`;
              break;
          case 9: // 第3段階2（コア機能3）
              stepText = "もっと書きたい 2/3";
              textToType = `「${dailyQuestions[4]}」`;
              break;
          case 10: // 第3段階3（コア機能3）
              stepText = "もっと書きたい 3/3";
              textToType = `「${dailyQuestions[5]}」`;
              break;
          case 11: // 完了（最終画面）
              isFinal = true;
              stepText = "完了！";
              textToType = "お疲れ様でした！<br>今日も手帳が書けましたね。";
              break;
          default:
              break;
      }

      // UIの更新
      stepIndicator.innerText = `【 ${stepText} 】`;
      primaryBtn.innerHTML = `<span class="cursor">▶︎</span>${primaryBtnText}`;

      // 完了画面ではボタンを隠すなどの処理
      if (isFinal) {
          primaryBtn.style.display = 'none';
          secondaryBtn.style.display = 'none';
          // 完了画面に別のメッセージを出すなどの拡張が可能
      } else {
          primaryBtn.style.display = 'flex';
          secondaryBtn.style.display = 'flex';
      }

      // タイプライター風のアニメーション（拡張機能④）
      typeWriter(textToType);
  };

  // 「かけた！」または「はい」で進む
  const nextStep = () => {
      currentState++;
      renderView();
  };

  // 「今日はここまで」で終了
  const finishEarly = () => {
      currentState = 11; // 完了画面へ飛ぶ
      renderView();
  };

  // タイプライターアニメーション関数
  const typeWriter = (text, speed = 60) => {
      let i = 0;
      messageText.innerHTML = "";
      // タイプライターのタイマーを開始
      typeWriterTimer = setInterval(() => {
          if (i < text.length) {
              // 改行文字（\nまたは<br>）の処理
              if (text.substr(i, 4) === '<br>') {
                  messageText.innerHTML += '<br>';
                  i += 4;
              } else if (text.charAt(i) === '\n') {
                  messageText.innerHTML += '<br>';
                  i++;
              } else {
                  messageText.innerHTML += text.charAt(i);
                  i++;
              }
          } else {
              // 終了したらタイマーをクリアし、点滅カーソルを追加
              clearInterval(typeWriterTimer);
              messageText.innerHTML += '<span class="blinking-cursor">▼</span>';
          }
      }, speed);
  };

  initApp();
</script>

</body>
</html>
