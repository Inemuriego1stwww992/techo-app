<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>手帳サポートアプリ</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Klee+One:wght@400;600&display=swap" rel="stylesheet">
<style>
  body {
    background-color: #F4F1EA; 
    color: #4A4036;
    font-family: 'Klee One', cursive, sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    margin: 0;
    padding: 20px;
    box-sizing: border-box;
    text-align: center;
  }
  #app-container {
    max-width: 400px;
    width: 100%;
  }
  .question-text {
    font-size: 1.6rem;
    font-weight: 600;
    margin-bottom: 40px;
    line-height: 1.6;
    letter-spacing: 0.05em;
  }
  .message-text {
    font-size: 1.3rem;
    margin-bottom: 30px;
    line-height: 1.5;
  }
  .button-group {
    display: flex;
    flex-direction: column;
    gap: 15px;
  }
  button {
    background-color: #C87A5E;
    color: #FFFDF9;
    border: none;
    padding: 18px;
    font-size: 1.2rem;
    font-family: 'Klee One', cursive, sans-serif;
    border-radius: 12px;
    cursor: pointer;
    box-shadow: 0 4px 0 #A85A40;
    transition: all 0.1s;
  }
  button:active {
    transform: translateY(4px);
    box-shadow: 0 0 0 #A85A40;
  }
  .btn-secondary {
    background-color: #E2DCCF;
    color: #5C5446;
    box-shadow: 0 4px 0 #C4BEB1;
  }
  .btn-secondary:active {
    box-shadow: 0 0 0 #C4BEB1;
  }
  .step-indicator {
    font-size: 0.9rem;
    color: #8C8477;
    margin-bottom: 10px;
  }
</style>
</head>
<body>

<div id="app-container">
  <div id="display-area">
    </div>
</div>

<script>
  // --- 質問の定義 ---
  const stage1Questions = [
    "きょう(あした)のスケジュールは？",
    "今日のTODOやタスクは？",
    "今日の目標は？"
  ];

  // 誰もが答えやすい日常の振り返り（第2段階）
  const stage2Pool = [
    "今日達成したこと、出来たことは？",
    "今日の発見、新しく知ったことは？",
    "今日一番美味しかったものは？",
    "今日、少しでも気分が上がった瞬間は？",
    "今日、誰かに「ありがとう」と言いたいことは？",
    "今日の自分に点数をつけるなら何点？その理由は？"
  ];

  // 思考を広げる、または深掘りする質問（第3段階）
  const stage3Pool = [
    "３ヶ月後の自分はどうなっていたい？",
    "今、一番やりたいこと・行きたい場所は？",
    "最近、心に残った言葉やニュースは？",
    "もし明日が完全に自由な1日だったら何をする？",
    "最近買ってよかったもの、または欲しいものは？",
    "今抱えているモヤモヤを一つだけ書き出すとしたら？"
  ];

  let dailyQuestions = []; 
  let currentIndex = 0;    

  const displayArea = document.getElementById('display-area');

  const getTodayString = () => {
    const d = new Date();
    return `${d.getFullYear()}-${d.getMonth()+1}-${d.getDate()}`;
  };

  const getRandomQuestions = (pool, count) => {
    const shuffled = [...pool].sort(() => 0.5 - Math.random());
    return shuffled.slice(0, count);
  };

  const initApp = () => {
    const savedDate = localStorage.getItem('techo_date');
    const savedIndex = localStorage.getItem('techo_index');
    const savedQuestions = localStorage.getItem('techo_questions');
    const today = getTodayString();

    if (savedDate === today && savedQuestions && savedIndex !== null) {
      dailyQuestions = JSON.parse(savedQuestions);
      currentIndex = parseInt(savedIndex);
      
      if (currentIndex > 0 && currentIndex < 9) {
        renderResumeConfirm();
      } else if (currentIndex >= 9) {
        renderFinish(); 
      } else {
        renderQuestion();
      }
    } else {
      resetAndStart();
    }
  };

  const resetAndStart = () => {
    const s2 = getRandomQuestions(stage2Pool, 3);
    const s3 = getRandomQuestions(stage3Pool, 3);
    dailyQuestions = [...stage1Questions, ...s2, ...s3];
    currentIndex = 0;
    saveState();
    renderQuestion();
  };

  const saveState = () => {
    localStorage.setItem('techo_date', getTodayString());
    localStorage.setItem('techo_index', currentIndex);
    localStorage.setItem('techo_questions', JSON.stringify(dailyQuestions));
  };

  const renderResumeConfirm = () => {
    displayArea.innerHTML = `
      <div class="message-text">前回の続きから<br>手帳を開きますか？</div>
      <div class="button-group">
        <button onclick="resume()">はい（続きから）</button>
        <button class="btn-secondary" onclick="resetAndStart()">いいえ（最初から）</button>
      </div>
    `;
  };

  const resume = () => {
    if (currentIndex === 3) renderBranch1();
    else if (currentIndex === 6) renderBranch2();
    else renderQuestion();
  };

  const renderQuestion = () => {
    let stageStr = "";
    let stepNum = 0;
    if (currentIndex < 3) { stageStr = "毎日書くこと"; stepNum = currentIndex + 1; }
    else if (currentIndex < 6) { stageStr = "書きたいとき"; stepNum = currentIndex - 2; }
    else { stageStr = "もっと書きたいとき"; stepNum = currentIndex - 5; }

    displayArea.innerHTML = `
      <div class="step-indicator">${stageStr} (${stepNum}/3)</div>
      <div class="question-text">${dailyQuestions[currentIndex]}</div>
      <div class="button-group">
        <button onclick="nextStep()">書けた！</button>
      </div>
    `;
  };

  const nextStep = () => {
    currentIndex++;
    saveState();

    if (currentIndex === 3) {
      renderBranch1();
    } else if (currentIndex === 6) {
      renderBranch2();
    } else if (currentIndex >= 9) {
      renderFinish();
    } else {
      renderQuestion();
    }
  };

  const renderBranch1 = () => {
    displayArea.innerHTML = `
      <div class="message-text">お疲れ様です。<br>手帳の基本が書けましたね！<br><br>さらに書きますか？</div>
      <div class="button-group">
        <button onclick="renderQuestion()">はい、書きます</button>
        <button class="btn-secondary" onclick="renderFinishEarly()">今日はここまで</button>
      </div>
    `;
  };

  const renderBranch2 = () => {
    displayArea.innerHTML = `
      <div class="message-text">素晴らしいです！<br>頭の中が整理されてきましたね。<br><br>もっと深掘りして書きますか？</div>
      <div class="button-group">
        <button onclick="renderQuestion()">はい、もっと書く</button>
        <button class="btn-secondary" onclick="renderFinishEarly()">今日はここまで</button>
      </div>
    `;
  };

  const renderFinishEarly = () => {
    currentIndex = 9; 
    saveState();
    renderFinish();
  };

  const renderFinish = () => {
    displayArea.innerHTML = `
      <div class="message-text">お疲れ様でした！<br>手帳と向き合う、<br>素敵な時間が過ごせましたね。</div>
      <div class="button-group">
        <button class="btn-secondary" onclick="resetAndStart()">最初からやり直す</button>
      </div>
    `;
  };

  initApp();
</script>

</body>
</html>
