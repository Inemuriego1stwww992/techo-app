<style>
  /* 全体設定 */
  body {
    background-color: #000000;
    color: #FFFFFF;
    font-family: 'DotGothic16', sans-serif;
    margin: 0;
    padding: 0;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    -webkit-font-smoothing: none; 
    -moz-osx-font-smoothing: grayscale;
    font-smooth: never;
    text-rendering: optimizeSpeed;
  }

  #app-container {
    max-width: 480px;
    width: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px;
    box-sizing: border-box;
    opacity: 0;
    transition: opacity 0.5s ease-in-out;
  }

  header {
    text-align: center;
    margin-bottom: 20px;
  }

  #app-title {
    font-size: 2.5rem;
    margin: 0 0 10px 0;
    letter-spacing: 0.1em;
  }

  #step-indicator {
    font-size: 1.1rem;
    margin: 0;
    color: #FFFFFF;
  }

  main {
    width: 100%;
    margin-bottom: 30px;
  }

  /* 黄色のメッセージウィンドウ */
  #message-window {
    background-color: #ECC42D;
    border: 8px solid;
    border-image: url('data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAgAAAAICAYAAADED76LAAAAPElEQVQoU2NkYGBgYGJkZGT4//8/AxMTE8P///8ZmJiYGP7//8/AxMTw//9/BiYmBiaGJ4YvBiYmBiaGLwYmBgaGJ4YfBgYmBiaGHwYGCAYGAAEAABAAAAA=') 1;

    box-sizing: border-box;
    position: relative;
    min-height: 160px;
  }

  #message-text {
    color: #000000;
    font-size: 1.2rem;
    margin: 0;
    line-height: 1.6;
    letter-spacing: 0.05em;
  }

  #blinking-cursor {
    color: #FFFFFF;
    font-size: 1.5rem;
    position: absolute;
    right: 20px;
    bottom: 15px;
    animation: blink 1s step-start infinite;
    display: none;
  }

  footer {
    width: 100%;
    display: flex;
    justify-content: space-between;
    box-sizing: border-box;
    padding: 0 10px;
    gap: 10px; /* ボタン間の隙間 */
  }

  .action-btn {
    background-color: transparent;
    color: #FFFFFF;
    border: none;
    font-family: 'DotGothic16', sans-serif;
    font-size: 1.1rem;
    padding: 10px 5px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: color 0.1s;
    flex: 1;
  }

  .pixel-arrow {
    display: inline-block;
    width: 4px;
    height: 4px;
    background: currentColor;
    box-shadow: 
      0 4px currentColor, 0 8px currentColor, 0 12px currentColor, 0 16px currentColor,
      4px 4px currentColor, 4px 8px currentColor, 4px 12px currentColor,
      8px 8px currentColor;
    margin-right: 12px;
    transform: translateY(-6px);
  }

  .action-btn:hover {
    color: #ECC42D;
  }

  .secondary-btn {
    color: #AAAAAA;
  }
  .secondary-btn:hover {
    color: #FFFFFF;
  }

  .fade-in {
    opacity: 1 !important;
  }

  @keyframes blink {
    50% { opacity: 0; }
  }
</style>
</head>

</div>
